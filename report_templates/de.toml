# German report templates

[weekly_status]
name = "Wochenstatus"

[[weekly_status.sections]]
heading = "Zusammenfassung"
body = "Projekt: {{project_name}} | Zeitraum: {{period}}"

[[weekly_status.sections]]
heading = "Erledigt"
body = "{{completed}}"

[[weekly_status.sections]]
heading = "In Bearbeitung"
body = "{{in_progress}}"

[[weekly_status.sections]]
heading = "Blockiert"
body = "{{blocked}}"

[[weekly_status.sections]]
heading = "Naechste Schritte"
body = "{{next_steps}}"

[sprint_review]
name = "Sprint-Uebersicht"

[[sprint_review.sections]]
