body = "{{sprint_dates}}"

[[sprint_review.sections]]
heading = "Erledigt"
body = "{{completed}}"

[[sprint_review.sections]]
heading = "In Bearbeitung"
body = "{{in_progress}}"

[[sprint_review.sections]]
heading = "Blockiert"
body = "{{blocked}}"

[[sprint_review.sections]]
heading = "Velocity"
body = "{{velocity}}"

[risk_register]
